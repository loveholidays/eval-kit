name: Build Main

on:
  push:
    branches: [main]

permissions:
  contents: write
  id-token: write  # Required for OIDC

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Check release state
        id: release
        run: |
          pnpm changeset status --output status.json || true
          if [ -f status.json ] && [ "$(cat status.json | jq '.releases | length')" -gt 0 ]; then
            echo "HAS_CHANGESETS=true" >> $GITHUB_OUTPUT
          else
            echo "HAS_CHANGESETS=false" >> $GITHUB_OUTPUT
          fi

          PACKAGE_NAME=$(node -p "require('./package.json').name")
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          if npm view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version > /dev/null 2>&1; then
            echo "CURRENT_VERSION_PUBLISHED=true" >> $GITHUB_OUTPUT
          else
            echo "CURRENT_VERSION_PUBLISHED=false" >> $GITHUB_OUTPUT
          fi

      - name: Version packages
        if: steps.release.outputs.HAS_CHANGESETS == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          pnpm changeset version
          git add .
          git commit -m "chore: version packages" || echo "No changes to commit"
          git push

      - name: Publish packages
        if: steps.release.outputs.HAS_CHANGESETS == 'true' || steps.release.outputs.CURRENT_VERSION_PUBLISHED == 'false'
        run: |
          npm install -g npm@11
          npm publish --access public
          git push --follow-tags
